<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>GPT Playground</title>
    <style>
        :root{
            --bg:#0f1724; --card:#0b1220; --accent:#7c3aed; --muted:#9aa4b2; --glass:rgba(255,255,255,0.03);
        }
        html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial}
        body{background:linear-gradient(180deg,#071025 0%, #081426 60%),radial-gradient(800px 400px at 10% 10%, rgba(124,58,237,0.08), transparent);color:#e6eef8}
        .wrap{max-width:980px;margin:36px auto;padding:28px}
        header{display:flex;align-items:center;gap:16px;margin-bottom:18px}
        .logo{width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#06b6d4);display:flex;align-items:center;justify-content:center;font-weight:700}
        h1{font-size:20px;margin:0}
        p.lead{margin:0;color:var(--muted);font-size:13px}

        .grid{display:grid;grid-template-columns:1fr 420px;gap:20px}
        .card{background:linear-gradient(180deg,var(--card), rgba(11,18,32,0.6));border-radius:12px;padding:18px;box-shadow:0 6px 18px rgba(2,6,23,0.6);border:1px solid rgba(255,255,255,0.03)}

        textarea#prompt{width:100%;min-height:170px;background:var(--glass);border:1px solid rgba(255,255,255,0.04);color:inherit;padding:12px;border-radius:8px;resize:vertical}
        .controls{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
        .control{display:flex;flex-direction:column}
        label{font-size:12px;color:var(--muted);margin-bottom:6px}
        input[type=number], select{background:transparent;border:1px solid rgba(255,255,255,0.04);padding:8px;border-radius:8px;color:inherit;min-width:110px}
        button.primary{background:linear-gradient(90deg,var(--accent),#06b6d4);border:none;color:#051025;padding:10px 14px;border-radius:10px;font-weight:600;cursor:pointer}
        button.ghost{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted);padding:8px 12px;border-radius:8px;cursor:pointer}

        .examples{display:flex;flex-direction:column;gap:8px;margin-top:12px}
        .example{background:rgba(255,255,255,0.02);padding:8px;border-radius:8px;font-size:13px;color:var(--muted);cursor:pointer}

        .output{white-space:pre-wrap;max-height:520px;overflow:auto;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:16px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);color:#e6eef8}
        .output .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .muted{color:var(--muted);font-size:13px}

        .row{display:flex;gap:12px}

        footer{margin-top:18px;color:var(--muted);font-size:13px}

        @media (max-width:900px){.grid{grid-template-columns:1fr;}.wrap{padding:18px}}
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <div class="logo">GPT</div>
            <div>
                <h1>GPT Playground</h1>
                <p class="lead">Type a prompt, tweak parameters and generate continuations from your model.</p>
            </div>
        </header>

        <div class="grid">
            <div class="card">
                <label for="prompt">Prompt</label>
                <textarea id="prompt" placeholder="Write your prompt here...">Once upon a time</textarea>

                <div class="controls">
                    <div class="control">
                        <label for="max_new_tokens">Max new tokens</label>
                        <input id="max_new_tokens" type="number" value="100" min="1">
                    </div>
                    <div class="control">
                        <label for="temperature">Temperature</label>
                        <input id="temperature" type="number" step="0.1" value="1.0" min="0.01">
                    </div>
                    <div class="control">
                        <label for="top_k">Top-k</label>
                        <input id="top_k" type="number" placeholder="none">
                    </div>
                    <div style="margin-left:auto;display:flex;gap:8px;align-items:flex-end">
                        <button id="generate" class="primary">Generate</button>
                        <button id="clear" class="ghost">Clear</button>
                    </div>
                </div>

                <div class="examples">
                    <div class="example" data-example="Write a short story about a clever robot.">Write a short story about a clever robot.</div>
                    <div class="example" data-example="A letter from the future to my younger self.">A letter from the future to my younger self.</div>
                </div>
                <footer>Model: best_model_params2.pt · <span class="muted">Local</span></footer>
            </div>

            <div class="card">
                <div class="output" id="output">
                    <div class="meta"><div class="muted">Output</div><div><button id="copy" class="ghost">Copy</button></div></div>
                    <div id="result">Your generated text will appear here.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const promptEl = document.getElementById('prompt');
        const resultEl = document.getElementById('result');
        const generateBtn = document.getElementById('generate');
        const clearBtn = document.getElementById('clear');
        const copyBtn = document.getElementById('copy');

        document.querySelectorAll('.example').forEach(e=>e.addEventListener('click',()=>{promptEl.value=e.dataset.example;}));

        clearBtn.addEventListener('click',()=>{promptEl.value='';resultEl.textContent='';});

        copyBtn.addEventListener('click',async()=>{await navigator.clipboard.writeText(resultEl.textContent||''); copyBtn.textContent='Copied'; setTimeout(()=>copyBtn.textContent='Copy',1200);});

        async function generate(){
            const prompt = promptEl.value.trim();
            if(!prompt){resultEl.textContent='Please enter a prompt.';return}
            const payload = {
                prompt,
                max_new_tokens: parseInt(document.getElementById('max_new_tokens').value)||100,
                temperature: parseFloat(document.getElementById('temperature').value)||1.0,
                // top_k: (document.getElementById('top_k').value==='')?null:parseInt(document.getElementById('top_k').value)
            };
            console.log('Payload:', payload);

            generateBtn.disabled = true; generateBtn.textContent='Generating...'; resultEl.textContent='';
            try{
                const res = await fetch('http://localhost:8000/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
                if(!res.ok){
                    const err = await res.json(); resultEl.textContent = 'Error: '+(err.detail||res.statusText); return;
                }
                const data = await res.json(); 
                resultEl.textContent = data.generated_text || '';
            }catch(e){ resultEl.textContent = 'Network error: '+e.message; }
            finally{ generateBtn.disabled=false; generateBtn.textContent='Generate'; }
        }

        generateBtn.addEventListener('click', (e)=>{ e.preventDefault(); generate(); });
        promptEl.addEventListener('keydown', (e)=>{ if(e.ctrlKey && e.key==='Enter'){ generate(); } });
    </script>
</body>
</html>
